<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Generator: ปกรายงานข้าราชการไทย</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --role-color: #27ae60;
            --spec-color: #e84393;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --border-radius: 12px;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Typography */
        h1.main-title {
            text-align: center;
            color: var(--primary-color);
            font-size: 2.5em;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        h2.section-title {
            font-size: 1.8em;
            margin-top: 0;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .role-title { color: var(--role-color); }
        .spec-title { color: var(--spec-color); }

        .subtitle {
            font-size: 1.1em;
            font-weight: 500;
            color: #555;
            margin-bottom: 20px;
        }

        /* Layout & Cards */
        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .form-col {
            flex: 1;
            min-width: 250px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #444;
        }

        /* Inputs */
        input[type="text"], select {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: 'Prompt', sans-serif;
            font-size: 1em;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(44, 62, 80, 0.2);
        }

        /* Range Slider */
        .range-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--role-color);
        }

        .age-display {
            background: var(--role-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        /* Radio Buttons */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 400;
            cursor: pointer;
        }

        /* Color Grid */
        .color-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .color-box {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .color-box:hover {
            transform: scale(1.1);
        }

        .color-box.selected {
            border-color: #333;
            transform: scale(1.1);
        }

        /* Buttons & Result */
        .btn-generate {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            font-weight: 600;
            font-family: 'Prompt', sans-serif;
            color: white;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: opacity 0.3s, transform 0.1s;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .btn-generate:hover { opacity: 0.9; }
        .btn-generate:active { transform: translateY(2px); }

        .result-box {
            background: #fff;
            padding: 20px;
            border-left: 5px solid #6c5ce7;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 1.05em;
            line-height: 1.5;
            color: #2d3436;
            margin-bottom: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .btn-copy {
            background: #2d3436;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            font-weight: 500;
            transition: background 0.3s;
        }

        .btn-copy:hover { background: #636e72; }

    </style>
</head>
<body>

<div class="container">
    <h1 class="main-title">ปกรายงานของข้าราชการไทยแบบสวยงาม</h1>

    <div class="card">
        <h2 class="section-title role-title">ส่วนที่ 1 Role</h2>
        <div class="subtitle">ให้คุณครูกรอกชื่อและข้อมูลที่กำหนดต่อไปนี้ >>></div>

        <div class="form-row">
            <div class="form-col">
                <div class="form-group">
                    <label>1.1 คำนำหน้าชื่อและนามสกุล (เว้น 2 วรรค)</label>
                    <input type="text" id="v_name" maxlength="50" placeholder="เช่น นายสมชาย  ใจดี">
                </div>
            </div>
            <div class="form-col">
                <div class="form-group">
                    <label>1.2 อายุ</label>
                    <div class="range-container">
                        <input type="range" id="v_age" min="20" max="60" value="35" oninput="document.getElementById('ageVal').innerText = this.value">
                        <span class="age-display" id="ageVal">35</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-col">
                <div class="form-group">
                    <label>1.3 เพศ</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="v_gender" value="ชาย" checked> ชาย</label>
                        <label class="radio-label"><input type="radio" name="v_gender" value="หญิง"> หญิง</label>
                    </div>
                </div>
            </div>
            <div class="form-col">
                <div class="form-group">
                    <label>1.4 ตำแหน่ง</label>
                    <select id="v_position">
                        <option value="ครู">ครู</option>
                        <option value="รองผู้อำนวยการสถานศึกษา">รองผู้อำนวยการสถานศึกษา</option>
                        <option value="ผู้อำนวยการสถานศึกษา">ผู้อำนวยการสถานศึกษา</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-col">
                <div class="form-group">
                    <label>1.5 วิทยฐานะ</label>
                    <select id="v_standing">
                        <option value="">ไม่มีวิทยฐานะ</option>
                        <option value="วิทยฐานะชำนาญการ">วิทยฐานะชำนาญการ</option>
                        <option value="วิทยฐานะชำนาญการพิเศษ">วิทยฐานะชำนาญการพิเศษ</option>
                        <option value="วิทยฐานะเชี่ยวชาญ">วิทยฐานะเชี่ยวชาญ</option>
                        <option value="วิทยฐานะเชี่ยวชาญพิเศษ">วิทยฐานะเชี่ยวชาญพิเศษ</option>
                    </select>
                </div>
            </div>
            <div class="form-col">
                <div class="form-group">
                    <label>1.6 กลุ่มสาระการเรียนรู้/กลุ่มงาน</label>
                    <input type="text" id="v_learning_area" maxlength="50" placeholder="เช่น วิทยาศาสตร์และเทคโนโลยี">
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-col">
                <div class="form-group">
                    <label>1.7 แผนก</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="v_dept_type" value="กลุ่มงาน"> กลุ่มงาน</label>
                        <label class="radio-label"><input type="radio" name="v_dept_type" value="กลุ่มสาระการเรียนรู้" checked> กลุ่มสาระการเรียนรู้</label>
                    </div>
                </div>
            </div>
            <div class="form-col">
                <div class="form-group">
                    <label>1.8 โรงเรียน</label>
                    <input type="text" id="v_school" maxlength="50" placeholder="เช่น โรงเรียนสตรีชัยภูมิ">
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-col">
                <div class="form-group">
                    <label>1.9 ระดับชั้นที่สอน</label>
                    <input type="text" id="v_grade" maxlength="50" placeholder="เช่น มัธยมศึกษาปีที่ 4">
                </div>
            </div>
            <div class="form-col">
                <div class="form-group">
                    <label>1.10 สังกัด</label>
                    <input type="text" id="v_affiliation" maxlength="80" placeholder="เช่น สพม.ชัยภูมิ">
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 class="section-title spec-title">ส่วนที่ 2 & 3 Spec การออกแบบ</h2>
        
        <div class="form-group">
            <label>2.1 ลักษณะสีของปก (เลือกสีโทนอัญมณี)</label>
            <div class="color-grid" id="colorGrid">
                <div class="color-box" style="background: #e91e63;" data-color="ชมพูทับทิม" title="ชมพูทับทิม"></div>
                <div class="color-box selected" style="background: #9c27b0;" data-color="ม่วงอเมทิสต์" title="ม่วงอเมทิสต์"></div>
                <div class="color-box" style="background: #0601db;" data-color="น้ำเงินไพลิน" title="น้ำเงินไพลิน"></div>
                <div class="color-box" style="background: #00b894;" data-color="เขียวมรกต" title="เขียวมรกต"></div>
                <div class="color-box" style="background: #d35400;" data-color="ส้มบุษราคัม" title="ส้มบุษราคัม"></div>
                <div class="color-box" style="background: #c0392b;" data-color="แดงโกเมน" title="แดงโกเมน"></div>
                <div class="color-box" style="background: #f2c119;" data-color="เหลืองบุศราคัม" title="เหลืองบุศราคัม"></div>

                <div class="color-box" style="background: #ffffff; border: 1px solid #ccc;" data-color="ขาวเพชรประกาย" title="ขาวเพชร"></div>
                <div class="color-box" style="background: #1a1a1a;" data-color="ดำนิลกาฬ" title="ดำนิล"></div>
                <div class="color-box" style="background: #dfe6e9;" data-color="เทาเงินมุก" title="เทาเงินมุก"></div>
                <div class="color-box" style="background: #74b9ff;" data-color="ฟ้านพเก้า" title="ฟ้านพเก้า"></div>
                <div class="color-box" style="background: #55efc4;" data-color="เขียวหยก" title="เขียวหยก"></div>
                <div class="color-box" style="background: #fab1a0;" data-color="โอรสปะการัง" title="โอรสปะการัง"></div>
                <div class="color-box" style="background: #ffeaa7;" data-color="เหลืองอำพัน" title="เหลืองอำพัน"></div>
                <div class="color-box" style="background: #a29bfe;" data-color="ม่วงดอกรัก" title="ม่วงดอกรัก"></div>
                <div class="color-box" style="background: #fd79a8;" data-color="ชมพูมอร์แกไนต์" title="ชมพูมอร์แกไนต์"></div>
                <div class="color-box" style="background: #e17055;" data-color="ส้มอิฐไพฑูรย์" title="ส้มอิฐไพฑูรย์"></div>
                <div class="color-box" style="background: #00cec9;" data-color="ฟ้าเทอร์ควอยซ์" title="ฟ้าเทอร์ควอยซ์"></div>
                <div class="color-box" style="background: #636e72;" data-color="เทารมควัน" title="เทารมควัน"></div>
                <div class="color-box" style="background: #b2bec3;" data-color="เงินเมทัลลิก" title="เงินเมทัลลิก"></div>
                <div class="color-box" style="background: #ff7675;" data-color="แดงกุหลาบ" title="แดงกุหลาบ"></div>
                <div class="color-box" style="background: #2d3436;" data-color="ดำถ่าน" title="ดำถ่าน"></div>
                
                <input type="hidden" id="v_color" value="ม่วงอเมทิสต์">
            </div>
        </div>

        <div class="form-group">
            <label>2.1.2 ชื่อปกรายงาน</label>
            <input type="text" id="v_cover_title" maxlength="100" placeholder="เช่น รายงานผลการปฏิบัติงาน นวัตกรรมสื่อการสอน">
        </div>

        <div class="form-row">
            <div class="form-col">
                <div class="form-group">
                    <label>2.2 ชุดที่สวมใส่</label>
                    <input type="text" id="v_outfit" maxlength="50" placeholder="เช่น ชุดปกติขาว / ชุดกากี / ชุดสูทสากล">
                </div>
            </div>
            <div class="form-col">
                <div class="form-group">
                    <label>2.3 ท่าทางการโพส</label>
                    <input type="text" id="v_posture" maxlength="50" placeholder="เช่น ยืนกอดอก / พนมมือ / ถือแท็บเล็ต">
                </div>
            </div>
        </div>
    </div>

    <button class="btn-generate" onclick="generatePrompt()">✨ สร้าง Prompt นำไปใช้งาน</button>

    <div class="card" id="resultCard" style="display: none;">
        <h2 class="section-title" style="color: #6c5ce7;">ผลลัพธ์ Prompt ของคุณ</h2>
        <div class="result-box" id="outputPrompt"></div>
        <button class="btn-copy" onclick="copyPrompt()">คัดลอก Prompt</button>
    </div>

</div>

<script>
    // ระบบเลือกสี
    const colorBoxes = document.querySelectorAll('.color-box');
    const colorInput = document.getElementById('v_color');

    colorBoxes.forEach(box => {
        box.addEventListener('click', function() {
            // เอาคลาส selected ออกจากทุกกล่อง
            colorBoxes.forEach(b => b.classList.remove('selected'));
            // ใส่คลาส selected ให้กล่องที่คลิก
            this.classList.add('selected');
            // อัปเดตค่าสีลงใน input ที่ซ่อนไว้
            colorInput.value = this.getAttribute('data-color');
        });
    });

    // ฟังก์ชันสร้าง Prompt
    function generatePrompt() {
        // ดึงค่าทั้งหมดจาก Form
        const name = document.getElementById('v_name').value.trim() || '[กรุณาระบุชื่อ]';
        const age = parseInt(document.getElementById('v_age').value);
        const ageCalc = Math.max(1, age - 5); // คำนวณอายุลบ 5
        const gender = document.querySelector('input[name="v_gender"]:checked').value;
        const position = document.getElementById('v_position').value;
        const rawStanding = document.getElementById('v_standing').value;
        const learningArea = document.getElementById('v_learning_area').value.trim() || '[ระบุกลุ่มสาระ/กลุ่มงาน]';
        const deptType = document.querySelector('input[name="v_dept_type"]:checked').value;
        const school = document.getElementById('v_school').value.trim() || '[ระบุโรงเรียน]';
        const grade = document.getElementById('v_grade').value.trim() || '[ระบุระดับชั้น]';
        const affiliation = document.getElementById('v_affiliation').value.trim() || '[ระบุสังกัด]';
        
        const color = document.getElementById('v_color').value;
        const coverTitle = document.getElementById('v_cover_title').value.trim() || '[ระบุชื่อปกรายงาน]';
        const outfit = document.getElementById('v_outfit').value.trim() || '[ระบุชุด]';
        const posture = document.getElementById('v_posture').value.trim() || '[ระบุท่าทาง]';

        // จัดการข้อความตำแหน่งและวิทยฐานะ
        let positionAndStanding = `ตำแหน่ง ${position}`;
        if (rawStanding !== "") {
            // ตัดคำว่า "วิทยฐานะ" ออกจาก value เดิม เพื่อเอามาประกอบใหม่ให้มีชื่อตำแหน่งคั่นกลาง
            const standingLevel = rawStanding.replace("วิทยฐานะ", "");
            positionAndStanding += ` วิทยฐานะ ${position}${standingLevel}`;
        }

        // ประกอบร่างข้อความ Prompt
        const finalPrompt = `คุณเป็นนักออกแบบปกอย่างมืออาชีพ จงออกแบบปกรายงานราชการไทยระดับประเทศที่สวยงามหรูหรา โทนอัญมณีสี${color}และทอง สไตล์ศิลปะไทยร่วมสมัย
องค์ประกอบหลัก:
- ซุ้มลายไทยสีทองแบบวิจิตรด้านบน ลักษณะคล้ายซุ้มวัดไทย
- พื้นหลังลวดลายไทยสี${color}แบบหรูหรา
- ด้านบนตรงกลางเป็นตราสัญลักษณ์ เหมือนโลโก้ที่ อัพโหลด 100 %เรืองแสง

บุคคลหลัก:
- คุณครู${gender}ชาวไทย ยืนอย่างสง่างามสมข้าราชการไทย อายุไม่เกิน ${ageCalc}
- ใส่ชุด${outfit}เหมือนในภาพที่อัพโหลด 100%
- ยืนอยู่หน้าโต๊ะที่มีหนังสือและแท็บเล็ต ${posture}อย่างสง่างาม

ธีมที่สอดคล้องกับ${learningArea}
เพิ่มองค์ประกอบด้าน${learningArea} เช่น
- อุปกรณ์การเรียนของครูผู้สอน
- สื่อการเรียนรู้ของนักเรียน
- สัญลักษณ์ที่เหมาะสมกับ${learningArea}
- โดรนที่เหมาะสมกับ${learningArea}
- โฮโลแกรมโลกดิจิทัลเกี่ยวกับ${learningArea}
- ไอคอน AI และ เทคโนโลยีอื่นๆที่ส่งเสริมสาขานี้
- สัญลักษณ์อื่นๆที่ใช้ใน${learningArea}

ฉากหลังแบ่งเป็น 2 ด้าน
ด้านซ้าย
- อาคารเรียนทรงไทยสวยงามทันสมัยแบบไทยประยุกต์
- บรรยากาศโรงเรียน สะอาด ปลอดภัย
- หนังสือวิชา${learningArea}

ด้านขวา
- ห้องเรียน${learningArea}
- องค์ประกอบที่สวยงามเหมาะสมกับรายวิชา${learningArea}
- อุปกรณ์การเรียนรู้ที่ทันสมัยของวิชา${learningArea}
- โมเดลจำลองประกอบวิชา${learningArea}
- อุปกรณ์อื่นๆบูรณาการเทคโนโลยีที่เหมาะกับ${grade} ใน${learningArea}
เอฟเฟกต์
- แสงออร่าสีทอง
- อนุภาคแสงลอย
- กลีบดอกไม้โปรย

ด้านล่าง
- ริบบิ้นสี${color}ทองหรูหรา
- พื้นที่สำหรับใส่ชื่อครู

ข้อความภาษาไทยบนปก:
${coverTitle} จัดให้เรียบร้อยสวยงาม

${name}
${positionAndStanding}
${deptType} ${learningArea}
${school}
